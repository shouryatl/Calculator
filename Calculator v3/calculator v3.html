<!DOCTYPE html>
<html>

<head>
    <title>Calculator v3</title>

    <link rel="stylesheet" href="calculator v3.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="calculator">

        <h1 class="heading">Calculator</h1>

        <div class="input-section">
            <label>First Number</label>

            <input type="number" class="input-box" placeholder="Enter first number">
        </div>

        <div class="input-section">
            <label>Second Number</label>

            <input type="number" class="input-box" placeholder="Enter second number">
        </div>

        <div class="button-row">

            <button class="operation-button">+</button>
            <button class="operation-button">−</button>
            <button class="operation-button">×</button>
            <button class="operation-button">÷</button>

        </div>

        <div class="result-box">
            Result: 0
        </div>

    </div>

    <script src="calculator v3.js"></script>

</body>

</html>
