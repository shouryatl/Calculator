<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>

    <link rel="stylesheet" href="calculator.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
</head>

<body>

    <div class="calculator">

        <p class="heading">Basic Calculator</p>

        <input type="number" placeholder="Enter first number" class="input-box">

        <input type="number" placeholder="Enter second number" class="input-box">

        <div class="button-row">
            <button class="operation-button">Add</button>

            <button class="operation-button">Subtract</button>

            <button class="operation-button">Multiply</button>

            <button class="operation-button">Divide</button>
        </div>

        <div class="result-box">
            Result: 0
        </div>

    </div>

</body>
</html>
